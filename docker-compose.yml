services:
  db:
    image: mysql:8.0
    container_name: figurinhass-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpwd
      MYSQL_DATABASE: figurinhass
      MYSQL_USER: figurinhass
      MYSQL_PASSWORD: figurinhass
    ports:
      - "3306:3306"
    volumes:
      - figurinhass_db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpwd"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  figurinhass_db:
